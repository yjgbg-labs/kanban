name: Web UI Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: arc-runner-set
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install buildctl
        run: |
          curl -sSL "https://github.com/moby/buildkit/releases/download/v0.21.1/buildkit-v0.21.1.linux-amd64.tar.gz" \
            | sudo tar -xz -C /usr/local

      - name: Build and push
        working-directory: web-ui
        run: |
          buildctl --addr tcp://buildkitd.arc-runners:1234 build \
            --frontend=dockerfile.v0 \
            --local context=. \
            --local dockerfile=. \
            --output "type=image,name=reg.yjgbg.lab/kanban-web:${{ github.ref_name }},push=true"
