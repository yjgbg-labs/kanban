name: Web UI Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: arc-runner-set
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Install buildctl
        run: |
          BUILDKIT_VERSION=$(curl -s https://api.github.com/repos/moby/buildkit/releases/latest \
            | grep -oP '"tag_name": "\K[^"]+')
          curl -sSL "https://github.com/moby/buildkit/releases/download/${BUILDKIT_VERSION}/buildkit-${BUILDKIT_VERSION}.linux-amd64.tar.gz" \
            | sudo tar -xz -C /usr/local

      - name: Configure GHCR credentials
        run: |
          mkdir -p ~/.docker
          printf '{"auths":{"ghcr.io":{"auth":"%s"}}}' \
            "$(printf '%s:%s' '${{ github.actor }}' '${{ secrets.GITHUB_TOKEN }}' | base64 -w0)" \
            > ~/.docker/config.json

      - name: Build and push
        working-directory: web-ui
        run: |
          buildctl --addr tcp://buildkitd.arc-runners:1234 build \
            --frontend=dockerfile.v0 \
            --local context=. \
            --local dockerfile=. \
            --output "type=image,name=ghcr.io/yjgbg-labs/kanban-web:${{ github.ref_name }},push=true" \
            --export-cache type=registry,ref=ghcr.io/yjgbg-labs/kanban-web:cache \
            --import-cache type=registry,ref=ghcr.io/yjgbg-labs/kanban-web:cache
