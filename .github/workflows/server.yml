name: Server CI

on:
  push:
    paths:
      - 'server/**'
      - '.github/workflows/server.yml'
  pull_request:
    paths:
      - 'server/**'
      - '.github/workflows/server.yml'

jobs:
  build:
    runs-on: arc-runner-set
    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        working-directory: .
        run: sudo apt-get update -qq && sudo apt-get install -y build-essential

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: tespkg/actions-cache@v1
        with:
          endpoint: ${{ env.ACTIONS_CACHE_S3_ENDPOINT }}
          accessKey: ${{ env.ACTIONS_CACHE_S3_ACCESS_KEY }}
          secretKey: ${{ env.ACTIONS_CACHE_S3_SECRET_KEY }}
          bucket: ${{ env.ACTIONS_CACHE_S3_BUCKET }}
          region: ${{ env.ACTIONS_CACHE_S3_REGION }}
          insecure: true
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            server/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('server/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --check

      - name: Lint
        run: cargo clippy -- -D warnings

      - name: Build
        run: cargo build --release

      - name: Test
        run: cargo test
