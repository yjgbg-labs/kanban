name: Web UI CI

on:
  push:
    paths:
      - 'web-ui/**'
      - '.github/workflows/web-ui.yml'
  pull_request:
    paths:
      - 'web-ui/**'
      - '.github/workflows/web-ui.yml'

jobs:
  build:
    runs-on: self-hosted
    defaults:
      run:
        working-directory: web-ui

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
