name: Web UI CI

on:
  push:
    paths:
      - 'web-ui/**'
      - '.github/workflows/web-ui.yml'
  pull_request:
    paths:
      - 'web-ui/**'
      - '.github/workflows/web-ui.yml'

jobs:
  build:
    runs-on: arc-runner-set
    defaults:
      run:
        working-directory: web-ui

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web-ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
